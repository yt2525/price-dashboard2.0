name: Scrape competitor prices

# Runs Playwright on GitHub's (US-based) runners and commits prices.json.
# Always scrapes ALL brands/products (no inputs).

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 */6 * * *"   # uncomment to run automatically every 6 hours

permissions:
  contents: write

concurrency:
  group: scrape-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run scraper (all products except OG/G2G)
        # OG and G2G are Cloudflare/IP-blocked on GitHub's datacenter runners,
        # so they're scraped locally (residential IP) and merged in via git push.
        # --merge preserves the OG/G2G entries the local runner pushed.
        run: python scrape.py --skip-comps OG,G2G --merge

      - name: Commit prices.json
        run: |
          git config user.name  "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prices.json scrape_report.json
          if git diff --cached --quiet; then
            echo "No price changes."
          else
            git commit -m "chore: update prices.json"
            git pull --rebase --autostash origin main
            git push
          fi

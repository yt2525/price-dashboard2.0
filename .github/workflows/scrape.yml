name: Scrape competitor prices

# Runs Playwright on GitHub's (US-based) runners and commits prices.json.
# Always scrapes ALL brands/products (no inputs).

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 */6 * * *"   # uncomment to run automatically every 6 hours

permissions:
  contents: write

concurrency:
  group: scrape-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run scraper
        # OG/G2G are JSON-API based and SEAGM now reads the /en-us/ page's embedded
        # clientData (USD by default — no Cloudflare currency-switch needed), so the
        # cloud scrapes those too. Only G2A still needs a residential IP, so it stays
        # on the local sync_og_g2g.command. --merge never overwrites a real price
        # with N/A, so a transient SEAGM/G2A block can't wipe existing values.
        run: python scrape.py --skip-comps G2A --merge

      - name: Commit prices.json
        run: |
          git config user.name  "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prices.json price_history.json scrape_report.json
          if git diff --cached --quiet; then
            echo "No price changes."
          else
            git commit -m "chore: update prices.json"
            git pull --rebase --autostash origin main
            git push
          fi

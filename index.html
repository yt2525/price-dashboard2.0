<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Reconciliation Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }
  
  .header { background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%); padding: 20px 30px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 1.4rem; font-weight: 700; color: #58a6ff; }
  .header .subtitle { font-size: 0.8rem; color: #8b949e; margin-top: 3px; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .btn { padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  .btn-secondary:hover { background: #30363d; }
  .btn-danger { background: #da3633; color: #fff; }
  .btn-danger:hover { background: #f85149; }

  .tabs-wrapper { background: #161b22; border-bottom: 1px solid #30363d; overflow-x: auto; }
  .tabs { display: flex; gap: 0; padding: 0 20px; white-space: nowrap; }
  .tab { padding: 10px 16px; cursor: pointer; font-size: 0.8rem; color: #8b949e; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab:hover { color: #c9d1d9; }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; font-weight: 600; }
  .tab-g2g { color: #c9463e; }
  .tab-g2g:hover { color: #f85149 !important; }
  .tab-g2g.active { color: #f85149 !important; border-bottom-color: #da3633 !important; }
  .tab-og { color: #4d8bc9; }
  .tab-og:hover { color: #58a6ff !important; }
  .tab-og.active { color: #58a6ff !important; border-bottom-color: #388bfd !important; }

  .main { padding: 20px 30px; }
  
  .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 18px; flex: 1; min-width: 140px; }
  .stat-card .label { font-size: 0.72rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
  .stat-card .value.green { color: #3fb950; }
  .stat-card .value.red { color: #f85149; }
  .stat-card .value.blue { color: #58a6ff; }
  .stat-card .value.yellow { color: #e3b341; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 0.95rem; font-weight: 600; color: #c9d1d9; }
  
  .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-input { flex: 1; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-size: 0.85rem; outline: none; }
  .search-input:focus { border-color: #58a6ff; }

  .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead th { background: #161b22; padding: 10px 12px; text-align: left; font-size: 0.72rem; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #30363d; white-space: nowrap; position: sticky; top: 0; }
  tbody tr { border-bottom: 1px solid #21262d; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #1c2128; }
  tbody td { padding: 8px 12px; vertical-align: middle; }
  .product-name { font-weight: 500; color: #c9d1d9; max-width: 220px; }
  .mini-btn { background: transparent; border: 1px solid #30363d; color: #8b949e; border-radius: 5px; cursor: pointer; font-size: 11px; padding: 1px 6px; margin-left: 6px; }
  .mini-btn:hover { color: #c9d1d9; border-color: #8b949e; }
  .add-denom-row td { padding: 10px 8px; border: none; }
  .add-denom-btn { background: #1c2740; border: 1px dashed #30363d; color: #58a6ff; border-radius: 6px; cursor: pointer; font-size: 12.5px; padding: 8px 14px; }
  .add-denom-btn:hover { background: #202c42; border-color: #58a6ff; }
  .btn-view { background: #1c2740; }
  .btn-view.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .urlmgr-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .urlmgr-head h2 { margin: 0; font-size: 1.2rem; color: #c9d1d9; }
  .urlmgr-note { color: #8b949e; font-size: 0.8rem; margin: 6px 0 16px; line-height: 1.5; }
  .urlmgr-cat { background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 10px; }
  .urlmgr-cat > summary { cursor: pointer; padding: 10px 14px; font-weight: 600; color: #c9d1d9; }
  .urlmgr-cat > summary .muted { color: #8b949e; font-weight: 400; font-size: 0.8rem; }
  .urlmgr-product { padding: 8px 14px; border-top: 1px solid #21262d; }
  .urlmgr-pname { font-size: 0.82rem; color: #adbac7; margin-bottom: 6px; font-weight: 500; }
  .urlmgr-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  .urlmgr-comp { flex: 0 0 96px; font-size: 0.75rem; color: #8b949e; }
  .urlmgr-input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 5px; padding: 5px 8px; font-size: 0.75rem; }
  .urlmgr-input:focus { outline: none; border-color: #1f6feb; }
  .urlmgr-input.has-url { color: #58a6ff; }
  .price-cell { text-align: center; }
  .price-input { width: 80px; background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 4px 6px; color: #c9d1d9; font-size: 0.8rem; text-align: center; outline: none; }
  .price-input:focus { border-color: #58a6ff; }
  .price-input.og-input { border-color: #238636; background: #0d1f0f; }
  .price-input.og-input:focus { border-color: #3fb950; }
  .price-input.price-low { color: #3fb950; font-weight: 700; border-color: #238636; background: #0d1f0f; }
  .price-input.price-high { color: #f85149; font-weight: 700; border-color: #b62324; background: #2d0f0f; }
  .na-cell { display: inline-block; color: #6e7681; font-size: 0.78rem; font-style: italic; cursor: pointer; padding: 4px 6px; }
  .na-cell:hover { color: #8b949e; text-decoration: underline; }
  .price-input.na-val { color: #8b949e; font-style: italic; font-weight: 600; background: #1a1f27; border-color: #30363d; }
  .mini-del:hover { color: #f85149; border-color: #f85149; }
  .link-btn { display: inline-block; padding: 2px 8px; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #58a6ff; font-size: 0.7rem; text-decoration: none; white-space: nowrap; }
  .link-btn:hover { background: #30363d; }
  .no-url { color: #484f58; font-size: 0.7rem; }
  
  .diff-badge { display: inline-block; padding: 2px 7px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; white-space: nowrap; }
  .diff-green { background: #0d1f0f; color: #3fb950; border: 1px solid #238636; }
  .diff-red { background: #1f0d0d; color: #f85149; border: 1px solid #da3633; }
  .diff-neutral { background: #21262d; color: #8b949e; border: 1px solid #30363d; }

  .chart-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .chart-section h3 { font-size: 0.9rem; font-weight: 600; color: #c9d1d9; margin-bottom: 16px; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
  .chart-container { position: relative; height: 300px; }

  .currency-selector { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; color: #c9d1d9; font-size: 0.82rem; outline: none; }
  
  .legend-og { display: inline-block; width: 10px; height: 10px; background: #3fb950; border-radius: 2px; margin-right: 4px; }
  
  .no-prices { color: #8b949e; font-style: italic; font-size: 0.78rem; }
  
  .progress-ring { display: inline-flex; align-items: center; gap: 6px; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
  .pill-green { background: #0d1f0f; color: #3fb950; }
  .pill-red { background: #1f0d0d; color: #f85149; }
  
  .avg-diff-cell { font-weight: 600; font-size: 0.82rem; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: #238636; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }

  /* G2G = red, OG = blue column headers */
  .th-g2g { background: #2d0d0d !important; color: #f85149 !important; border-bottom: 2px solid #da3633 !important; }
  .th-og  { background: #0d1629 !important; color: #58a6ff !important; border-bottom: 2px solid #388bfd !important; }
  .cell-g2g { background: rgba(248,81,73,0.04); }
  .cell-og  { background: rgba(88,166,255,0.04); }

  .btn-fetch { background: #1f3d5e; color: #58a6ff; border: 1px solid #388bfd; }
  .btn-fetch:hover { background: #2d5a8a; }
  .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; }

  .fetch-progress { position: fixed; bottom: 60px; right: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; font-size: 0.8rem; color: #c9d1d9; min-width: 220px; display: none; z-index: 1000; }
  .fetch-progress.show { display: block; }
  .fetch-bar-outer { background: #21262d; border-radius: 4px; height: 6px; margin-top: 8px; }
  .fetch-bar-inner { background: #58a6ff; height: 6px; border-radius: 4px; transition: width 0.3s; }
  .na-value { color: #8b949e; font-style: italic; font-size: 0.75rem; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header h1" style="font-size:1.4rem;font-weight:700;color:#58a6ff;">Price Reconciliation</div>
    <div class="subtitle">Red tabs reconcile against G2G · Blue tabs against OffGamers</div>
  </div>
  <div class="header-right">
    <button class="btn btn-view active" id="viewDashboardBtn" onclick="switchView('dashboard')">📊 Dashboard</button>
    <button class="btn btn-view" id="viewUrlsBtn" onclick="switchView('urls')">🔗 Manage URLs</button>
    <select class="currency-selector" id="currencySelect">
      <option value="USD">USD $</option>
      <option value="EUR">EUR €</option>
      <option value="MYR">MYR RM</option>
      <option value="SGD">SGD $</option>
    </select>
    <button class="btn btn-fetch" id="fetchBtn" onclick="fetchAllPrices()">🔄 Fetch Prices</button>
    <button class="btn btn-primary" onclick="saveAllPrices()">💾 Save</button>
    <button class="btn btn-secondary" onclick="exportCSV()">📥 Export CSV</button>
    <button class="btn btn-danger" onclick="clearAllPrices()">🗑 Clear</button>
    <button class="btn btn-secondary" id="syncBtn" onclick="syncPricesJson(true)" title="Load the latest scraped prices.json">⟳ Sync Latest</button>
    <span id="syncInfo" style="font-size:0.72rem;color:#8b949e;align-self:center;"></span>
  </div>
</div>

<div class="tabs-wrapper">
  <div class="tabs" id="tabsContainer"></div>
</div>

<div class="main" id="mainContent"></div>

<div class="toast" id="toast"></div>
<div class="fetch-progress" id="fetchProgress">
  <span id="fetchProgressText">Preparing…</span>
  <div class="fetch-bar-outer"><div class="fetch-bar-inner" id="fetchBarInner" style="width:0%"></div></div>
</div>

let currentSheet = Object.keys(RAW_DATA)[0];
let prices = {};        // manual edits (localStorage)
let scraped = {};       // scraped values loaded from prices.json
let pricesMeta = null;  // timestamp from prices.json
let charts = {};

function getStorageKey() { return 'og_prices_v2'; }
function loadPrices() { try { prices = JSON.parse(localStorage.getItem(getStorageKey()) || '{}'); } catch(e) { prices = {}; } }
function savePricesLocal() { localStorage.setItem(getStorageKey(), JSON.stringify(prices)); }

function getPriceKey(sheet, productName, competitor) {
  return `${sheet}__${productName}__${competitor}`;
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function isRealUrl(v) { return typeof v === 'string' && /^https?:\/\//i.test(v.trim()); }

function getPrice(sheet, productName, competitor) {
  const k = getPriceKey(sheet, productName, competitor);
  const manual = prices[k];                       // user edits win
  if (manual !== undefined && manual !== '') return manual;
  const s = scraped[k];                            // else scraped value
  return (s !== undefined && s !== null && s !== '') ? s : '';
}

// Load the latest scraped prices.json (written by the GitHub Actions scraper).
async function syncPricesJson(manualClick) {
  const info = document.getElementById('syncInfo');
  try {
    const resp = await fetch('./prices.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error('no prices.json (' + resp.status + ')');
    const data = await resp.json();
    scraped = {};
    const P = data.prices || {};
    Object.keys(P).forEach(sheet => {
      Object.keys(P[sheet]).forEach(pname => {
        Object.entries(P[sheet][pname]).forEach(([comp, val]) => {
          if (val !== null && val !== '') scraped[getPriceKey(sheet, pname, comp)] = val;
        });
      });
    });
    pricesMeta = data.generated || null;
    if (info) info.textContent = pricesMeta ? 'Prices as of ' + new Date(pricesMeta).toLocaleString() : '';
    render();
    if (manualClick) toast('⟳ Loaded latest scraped prices');
    return true;
  } catch (e) {
    if (info) info.textContent = 'No prices.json yet — run the scraper';
    if (manualClick) toast('⚠ ' + e.message);
    return false;
  }
}

function setPrice(sheet, productName, competitor, val) {
  const key = getPriceKey(sheet, productName, competitor);
  if (val === '' || val === null) { delete prices[key]; } 
  else { prices[key] = val; }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function saveAllPrices() {
  // Read all inputs into prices
  document.querySelectorAll('input.price-input').forEach(inp => {
    const { sheet, product, competitor } = inp.dataset;
    setPrice(sheet, product, competitor, parsePriceEntry(inp.value));
  });
  savePricesLocal();
  toast('✅ Prices saved!');
  updateStats();
  updateCharts();
}

function clearAllPrices() {
  if (!confirm('Clear all entered prices?')) return;
  prices = {};
  savePricesLocal();
  document.querySelectorAll('input.price-input').forEach(inp => inp.value = '');
  updateStats();
  updateCharts();
  toast('🗑 Cleared all prices');
}

}

function renderTabs() {
  const c = document.getElementById('tabsContainer');
  c.innerHTML = '';
  Object.keys(RAW_DATA).forEach(sheet => {
    const t = document.createElement('div');
    const focus = getFocusCompetitor(sheet);
    t.className = 'tab' + (sheet === currentSheet ? ' active' : '') + (focus === 'G2G' ? ' tab-g2g' : ' tab-og');

function calcDiff(ogPrice, competitorPrice) {
  const og = parseFloat(ogPrice);
  const comp = parseFloat(competitorPrice);
  if (isNaN(og) || isNaN(comp) || comp === 0) return null;
  return ((og - comp) / comp * 100).toFixed(1);
}

function getCurrencySymbol() {
  const v = document.getElementById('currencySelect').value;
  return { USD: '$', EUR: '€', MYR: 'RM', SGD: 'S$' }[v] || '$';
}

// ---- Currency: prices are stored in USD; display converts via live FX rates ----
let fxRates = { USD: 1, EUR: 0.92, MYR: 4.7, SGD: 1.34 }; // fallback if fetch fails
async function loadFxRates() {
  try {
    const r = await fetch('https://api.frankfurter.app/latest?from=USD&to=EUR,MYR,SGD');
    if (r.ok) { const d = await r.json(); fxRates = Object.assign({ USD: 1 }, d.rates || {}); render(); }
  } catch (e) { /* keep fallback */ }
}
function getCurrency() { const el = document.getElementById('currencySelect'); return el ? el.value : 'USD'; }
function getRate() { return fxRates[getCurrency()] || 1; }
function usdToDisplay(usd) {
  if (usd === '' || usd === null || usd === undefined) return '';
  const n = parseFloat(usd); if (isNaN(n)) return '';
  return +(n * getRate()).toFixed(2);
}
function displayToUsd(raw) {
  const s = String(raw).trim(); if (s === '') return '';
  const n = parseFloat(s); if (isNaN(n)) return '';
  return +(n / getRate()).toFixed(4);
}
// Interpret what the user typed in a price cell: blank, "N/A", or a number (-> stored USD).
function parsePriceEntry(raw) {
  const s = String(raw).trim();
  if (s === '') return '';
  if (/^n\/?a$/i.test(s)) return 'N/A';
  return displayToUsd(s);
}

  inp.type = 'text'; inp.setAttribute('inputmode', 'decimal'); inp.className = 'price-input';

// Colour the lowest competitor price green and the highest red, per row.
function highlightPrices() {
  document.querySelectorAll('#tableBody tr[data-product]').forEach(tr => {
    const inputs = [...tr.querySelectorAll('input.price-input')];
    inputs.forEach(i => i.classList.remove('price-low', 'price-high'));
    const vals = inputs.map(i => ({ i, v: parseFloat(i.value) })).filter(o => !isNaN(o.v) && o.v > 0);
    if (vals.length < 2) return;
    const min = Math.min(...vals.map(o => o.v));
    const max = Math.max(...vals.map(o => o.v));
    if (min === max) return;
    vals.forEach(o => {
      if (o.v === min) o.i.classList.add('price-low');
      if (o.v === max) o.i.classList.add('price-high');
    });
  });
}

function updateRowDiffs() {
  const sheet = currentSheet;
  const data = RAW_DATA[sheet];
  const products = data.products;
  const sym = getCurrencySymbol();
  const focus = getFocusCompetitor(sheet);

  products.forEach((product, pi) => {
    const pname = product.name;
    const ogPrice = parseFloat(getPrice(sheet, pname, focus));
    const competitors = data.competitors.filter(c => c !== focus);
    
    const compPrices = competitors.map(c => parseFloat(getPrice(sheet, pname, c))).filter(v => !isNaN(v) && v > 0);
    
    const avgCell = document.getElementById(`avg-${pi}`);
    const lowestCell = document.getElementById(`lowest-${pi}`);
    
    if (avgCell && !isNaN(ogPrice) && ogPrice > 0 && compPrices.length > 0) {
      const avg = compPrices.reduce((a,b) => a+b, 0) / compPrices.length;
      const diff = ((ogPrice - avg) / avg * 100).toFixed(1);
      const isLower = parseFloat(diff) < 0;
      avgCell.innerHTML = `<span class="diff-badge ${isLower ? 'diff-green' : 'diff-red'}">${isLower ? '' : '+'}${diff}%</span>`;
    } else if (avgCell) {
      avgCell.innerHTML = '<span class="no-prices">—</span>';
    }
    
    if (lowestCell && !isNaN(ogPrice) && ogPrice > 0 && compPrices.length > 0) {
      const lowestComp = Math.min(...compPrices);
      const diff = ((ogPrice - lowestComp) / lowestComp * 100).toFixed(1);
      const isLower = parseFloat(diff) < 0;
      lowestCell.innerHTML = `<span class="diff-badge ${isLower ? 'diff-green' : 'diff-red'}">${isLower ? '✅ ' : '❌ '}${isLower ? '' : '+'}${diff}% vs lowest</span>`;
    } else if (lowestCell) {
      lowestCell.innerHTML = '<span class="no-prices">—</span>';
    }
  });
}

function updateStats() {
  const sheet = currentSheet;
  const data = RAW_DATA[sheet];
  const products = data.products;
  const focus = getFocusCompetitor(sheet);

  let entered = 0, lowestCount = 0, higherCount = 0, totalAdv = 0, advCount = 0;

  products.forEach(product => {
    const pname = product.name;
    const ogPrice = parseFloat(getPrice(sheet, pname, focus));
    if (isNaN(ogPrice) || ogPrice <= 0) return;
    entered++;

    const competitors = data.competitors.filter(c => c !== focus);
    const compPrices = competitors.map(c => parseFloat(getPrice(sheet, pname, c))).filter(v => !isNaN(v) && v > 0);
    
    if (compPrices.length === 0) return;
    const lowestComp = Math.min(...compPrices);
    
    if (ogPrice <= lowestComp) lowestCount++;
    if (ogPrice > lowestComp) higherCount++;
    
    const diff = (lowestComp - ogPrice) / lowestComp * 100;
    totalAdv += diff;
    advCount++;
  });
  
  const s = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  s('stat-lowest', lowestCount);
  s('stat-avg-adv', advCount > 0 ? (totalAdv / advCount).toFixed(1) + '%' : '-');
  s('stat-higher', higherCount);
  s('stat-entered', entered);
}

// ── Price Fetching via CORS Proxy ──────────────────────────────────────────

const CORS_PROXY = 'https://corsproxy.io/?url=';

// Site-specific sold-out / unavailable markers
const SOLD_OUT_PATTERNS = [
  /sold[\s-]?out/i, /out[\s-]?of[\s-]?stock/i, /not[\s-]?available/i,
  /unavailable/i, /currently[\s-]?unavailable/i, /no[\s-]?stock/i
];

function isSoldOut(html) {
  return SOLD_OUT_PATTERNS.some(p => p.test(html));
}

// Extract price from schema.org JSON-LD
function extractJsonLdPrice(html) {
  const blocks = [...html.matchAll(/<script[^>]*type="application\/ld\+json"[^>]*>([\s\S]*?)<\/script>/gi)];
  for (const b of blocks) {
    try {
      const data = JSON.parse(b[1]);
      const scan = (obj) => {
        if (!obj || typeof obj !== 'object') return null;
        if (obj['@type'] === 'Product' || obj['@type'] === 'Offer') {
          const offers = obj.offers || obj;
          const p = offers.price ?? offers.lowPrice ?? offers.highPrice;
          if (p != null && !isNaN(parseFloat(p))) return parseFloat(p);
        }
        for (const v of Object.values(obj)) {
          if (Array.isArray(v)) { for (const i of v) { const r = scan(i); if (r) return r; } }
          else { const r = scan(v); if (r) return r; }
        }
        return null;
      };
      const p = scan(data);
      if (p) return p;
    } catch(e) {}
  }
  return null;
}

// Site-specific parsers
function parsePriceForSite(html, competitor, url) {
  // 1. Try JSON-LD first (works on OG, SEAGM, Moogold, LapakGaming)
  const jld = extractJsonLdPrice(html);
  if (jld) return jld;

  // 2. meta product:price:amount (OpenGraph)
  const ogMeta = html.match(/property="product:price:amount"\s+content="([^"]+)"/i)
                 || html.match(/content="([^"]+)"\s+property="product:price:amount"/i);
  if (ogMeta) return parseFloat(ogMeta[1]);

  // 3. itemprop price
  const itemprop = html.match(/itemprop="price"[^>]*content="([^"]+)"/i)
                || html.match(/itemprop="price"[^>]*>([^<]+)</i);
  if (itemprop) { const v = parseFloat(itemprop[1]); if (!isNaN(v)) return v; }

  // 4. Site-specific patterns
  if (url.includes('offgamers.com')) {
    const m = html.match(/["']price["']\s*:\s*["']?(\d+\.?\d*)["']?/);
    if (m) return parseFloat(m[1]);
  }
  if (url.includes('seagm.com')) {
    const m = html.match(/class="[^"]*price[^"]*"[^>]*>\s*[\w$€£¥]?\s*([\d,]+\.?\d*)/i);
    if (m) return parseFloat(m[1].replace(/,/g,''));
  }
  if (url.includes('moogold.com')) {
    const m = html.match(/["']regular_price["']\s*:\s*["']?(\d+\.?\d*)["']?/)
           || html.match(/class="[^"]*woocommerce-Price-amount[^"]*"[^>]*>[\s\S]*?([\d,]+\.?\d*)/i);
    if (m) return parseFloat(m[1].replace(/,/g,''));
  }
  if (url.includes('lapakgaming.com')) {
    const m = html.match(/["']price["']\s*:\s*(\d+\.?\d*)/)
           || html.match(/Rp\s*([\d,.]+)/);
    if (m) return parseFloat(m[1].replace(/[.,]/g,''));
  }
  if (url.includes('codashop.com')) {
    const m = html.match(/["']price["']\s*:\s*["']?(\d+\.?\d*)["']?/);
    if (m) return parseFloat(m[1]);
  }
  if (url.includes('unipin.com')) {
    const m = html.match(/["']price["']\s*:\s*(\d+\.?\d*)/);
    if (m) return parseFloat(m[1]);
  }

  // 5. Generic number near currency symbols
  const currencyMatch = html.match(/(?:USD|US\$|\$|€|£)\s*([\d,]+\.?\d*)/);
  if (currencyMatch) return parseFloat(currencyMatch[1].replace(/,/g,''));

  return null;
}

async function fetchPriceForURL(url, competitor) {
  try {
    const resp = await fetch(CORS_PROXY + encodeURIComponent(url), {
      signal: AbortSignal.timeout(12000)
    });
    if (!resp.ok) return 'N/A';
    const html = await resp.text();
    if (isSoldOut(html)) return 'N/A';
    const price = parsePriceForSite(html, competitor, url);
    return price != null ? String(price) : null; // null = could not parse
  } catch(e) {
    return null;
  }
}

// Batch fetch all visible products for current sheet
async function fetchAllPrices() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Fetching…';

  const progressEl = document.getElementById('fetchProgress');
  const progressText = document.getElementById('fetchProgressText');
  const progressBar = document.getElementById('fetchBarInner');
  progressEl.classList.add('show');

  const { competitors, products } = RAW_DATA[currentSheet];
  const tasks = [];
  products.forEach((product, pi) => {
    competitors.forEach(comp => {
      const url = product.urls[comp];
      if (isRealUrl(url)) tasks.push({ url, comp, sheet: currentSheet, pname: product.name, pi });
    });
  });

  let done = 0;
  const CONCURRENCY = 4;
  let idx = 0;

  async function runNext() {
    while (idx < tasks.length) {
      const task = tasks[idx++];
      progressText.textContent = `Fetching ${done + 1} / ${tasks.length}…`;
      progressBar.style.width = (done / tasks.length * 100) + '%';

      const result = await fetchPriceForURL(task.url, task.comp);
      done++;

      if (result !== null) {
        const displayVal = result === 'N/A' ? 'N/A' : result;
        // Update price store
        if (result !== 'N/A') {
          setPrice(task.sheet, task.pname, task.comp, result);
        }
        // Update DOM input
        const inputs = document.querySelectorAll(
          `input[data-sheet="${task.sheet.replace(/"/g,'&quot;')}"][data-product="${task.pname.replace(/"/g,'&quot;')}"][data-competitor="${task.comp}"]`
        );
        inputs.forEach(input => {
          if (result === 'N/A') {
            input.value = '';
            input.placeholder = 'N/A';
            input.style.color = '#8b949e';
          } else {
            input.value = result;
            input.style.color = '';
          }
        });
      }

      progressBar.style.width = (done / tasks.length * 100) + '%';
    }
  }

  // Run with concurrency limit
  const workers = Array.from({ length: CONCURRENCY }, runNext);
  await Promise.all(workers);

  savePricesLocal();
  updateStats();
  updateCharts();

  progressText.textContent = `✅ Done — ${done} URLs checked`;
  progressBar.style.width = '100%';
  setTimeout(() => progressEl.classList.remove('show'), 3000);

  btn.disabled = false;
  btn.textContent = '🔄 Fetch Prices';
  toast(`✅ Fetched prices for ${currentSheet}`);
}

// ---- Custom catalog: user-added denominations + renamed products (saved locally) ----
let catalogOverrides = {};
function loadCatalogOverrides() {
  try { catalogOverrides = JSON.parse(localStorage.getItem('catalog_overrides_v1') || '{}'); }
  catch (e) { catalogOverrides = {}; }
}
function saveCatalogOverrides() {
  localStorage.setItem('catalog_overrides_v1', JSON.stringify(catalogOverrides));
}
function applyCatalogOverrides() {
  Object.keys(RAW_DATA).forEach(sheet => {
    const ov = catalogOverrides[sheet];
    if (!ov) return;
    if (ov.renames) {
      RAW_DATA[sheet].products.forEach(p => { if (ov.renames[p.name]) p.name = ov.renames[p.name]; });
    }
    if (ov.added) {
      ov.added.forEach(name => {
        if (!RAW_DATA[sheet].products.some(p => p.name === name)) {
          RAW_DATA[sheet].products.push({ name: name, urls: {} });
        }
      });
    }
    if (ov.deleted && ov.deleted.length) {
      RAW_DATA[sheet].products = RAW_DATA[sheet].products.filter(p => !ov.deleted.includes(p.name));
    }
  });
}
function addDenomination() {
  const sheet = currentSheet;
  const name = (prompt('New denomination / product name for "' + sheet + '":') || '').trim();
  if (!name) return;
  if (RAW_DATA[sheet].products.some(p => p.name === name)) { toast('That name already exists'); return; }
  RAW_DATA[sheet].products.push({ name: name, urls: {} });
  catalogOverrides[sheet] = catalogOverrides[sheet] || {};
  catalogOverrides[sheet].added = catalogOverrides[sheet].added || [];
  catalogOverrides[sheet].added.push(name);
  saveCatalogOverrides();
  renderContent();
  toast('➕ Added "' + name + '"');
}
function editProductName(pi) {
  const sheet = currentSheet;
  const product = RAW_DATA[sheet].products[pi];
  if (!product) return;
  const oldName = product.name;
  const newName = (prompt('Rename product:', oldName) || '').trim();
  if (!newName || newName === oldName) return;
  if (RAW_DATA[sheet].products.some((p, i) => i !== pi && p.name === newName)) { toast('That name already exists'); return; }
  // migrate any saved manual prices old -> new
  (RAW_DATA[sheet].competitors || []).forEach(c => {
    const oldK = getPriceKey(sheet, oldName, c), newK = getPriceKey(sheet, newName, c);
    if (prices[oldK] !== undefined) { prices[newK] = prices[oldK]; delete prices[oldK]; }
  });
  savePricesLocal();
  catalogOverrides[sheet] = catalogOverrides[sheet] || {};
  if (catalogOverrides[sheet].added && catalogOverrides[sheet].added.includes(oldName)) {
    catalogOverrides[sheet].added = catalogOverrides[sheet].added.map(n => n === oldName ? newName : n);
  } else {
    catalogOverrides[sheet].renames = catalogOverrides[sheet].renames || {};
    let orig = oldName;
    for (const o in catalogOverrides[sheet].renames) {
      if (catalogOverrides[sheet].renames[o] === oldName) { orig = o; break; }
    }
    catalogOverrides[sheet].renames[orig] = newName;
  }
  product.name = newName;
  saveCatalogOverrides();
  renderContent();
  toast('✏️ Renamed');
}
function deleteDenomination(pi) {
  const sheet = currentSheet;
  const product = RAW_DATA[sheet].products[pi];
  if (!product) return;
  const name = product.name;
  if (!confirm('Delete "' + name + '"? This removes the row from ' + sheet + '.')) return;
  // remove the product row
  RAW_DATA[sheet].products.splice(pi, 1);
  // clean up any saved manual prices for it
  (RAW_DATA[sheet].competitors || []).forEach(c => { delete prices[getPriceKey(sheet, name, c)]; });
  savePricesLocal();
  // persist the deletion
  catalogOverrides[sheet] = catalogOverrides[sheet] || {};
  if (catalogOverrides[sheet].added && catalogOverrides[sheet].added.includes(name)) {
    // it was a user-added row — just drop it from added
    catalogOverrides[sheet].added = catalogOverrides[sheet].added.filter(n => n !== name);
  } else {
    catalogOverrides[sheet].deleted = catalogOverrides[sheet].deleted || [];
    if (!catalogOverrides[sheet].deleted.includes(name)) catalogOverrides[sheet].deleted.push(name);
  }
  saveCatalogOverrides();
  renderContent();
  toast('🗑 Deleted "' + name + '"');
}

// ---- View switching (Dashboard vs Manage URLs) ----
let activeView = 'dashboard';
function render() {
  if (activeView === 'urls') renderUrlManager();
  else renderContent();
  const d = document.getElementById('viewDashboardBtn'), u = document.getElementById('viewUrlsBtn');
  if (d) d.classList.toggle('active', activeView === 'dashboard');
  if (u) u.classList.toggle('active', activeView === 'urls');
}
function switchView(v) { activeView = v; render(); }

// ---- URL overrides (edits made in the Manage URLs page, saved locally) ----
let urlOverrides = {};
function loadUrlOverrides() {
  try { urlOverrides = JSON.parse(localStorage.getItem('url_overrides_v1') || '{}'); }
  catch (e) { urlOverrides = {}; }
}
function saveUrlOverrides() { localStorage.setItem('url_overrides_v1', JSON.stringify(urlOverrides)); }
function applyUrlOverrides() {
  Object.keys(urlOverrides).forEach(key => {
    const [sheet, product, comp] = key.split('__');
    const data = RAW_DATA[sheet]; if (!data) return;
    const p = data.products.find(p => p.name === product); if (!p) return;
    p.urls = p.urls || {};
    if (urlOverrides[key]) p.urls[comp] = urlOverrides[key]; else delete p.urls[comp];
  });
}
function onUrlEdit(inp) {
  const sheet = inp.dataset.sheet, product = inp.dataset.product, comp = inp.dataset.comp;
  const v = inp.value.trim();
  const data = RAW_DATA[sheet];
  const p = data && data.products.find(p => p.name === product);
  if (p) { p.urls = p.urls || {}; if (v) p.urls[comp] = v; else delete p.urls[comp]; }
  urlOverrides[getPriceKey(sheet, product, comp)] = v;
  saveUrlOverrides();
  inp.classList.toggle('has-url', isRealUrl(v));
}
function openUrl(btn) {
  const inp = btn.parentElement.querySelector('input');
  const v = inp && inp.value.trim();
  if (isRealUrl(v)) window.open(v, '_blank', 'noopener');
  else toast('No link for this one (N/A)');
}
function renderUrlManager() {
  const container = document.getElementById('mainContent');
  let html = `<div class="urlmgr-head"><h2>🔗 Manage URLs</h2>`
    + `<div><button class="btn btn-secondary" onclick="exportUrlsJson()">⬇ Export urls.json</button></div></div>`
    + `<p class="urlmgr-note">Edit any URL inline — changes save in your browser. Click ↗ to open the page in a new tab. `
    + `Automatic price capture runs server-side via the scheduled scraper; a browser can't read prices from these sites directly. `
    + `Use <b>Export urls.json</b> to download your edits and commit them so the scraper picks them up.</p>`;
  Object.keys(RAW_DATA).forEach(sheet => {
    const data = RAW_DATA[sheet];
    html += `<details class="urlmgr-cat"${sheet === currentSheet ? ' open' : ''}>`
      + `<summary>${escHtml(sheet)} <span class="muted">(${data.products.length} products)</span></summary>`;
    data.products.forEach(p => {
      html += `<div class="urlmgr-product"><div class="urlmgr-pname">${escHtml(p.name)}</div>`;
      data.competitors.forEach(c => {
        const u = (p.urls && p.urls[c]) || '';
        html += `<div class="urlmgr-row"><span class="urlmgr-comp">${escHtml(c)}</span>`
          + `<input class="urlmgr-input${isRealUrl(u) ? ' has-url' : ''}" type="url" value="${escHtml(u)}" placeholder="(no URL)" `
          + `data-sheet="${escHtml(sheet)}" data-product="${escHtml(p.name)}" data-comp="${escHtml(c)}" onchange="onUrlEdit(this)">`
          + `<button class="mini-btn" title="Open page" onclick="openUrl(this)">↗</button></div>`;
      });
      html += `</div>`;
    });
    html += `</details>`;
  });
  container.innerHTML = html;
}
function exportUrlsJson() {
  const out = { generated: new Date().toISOString(), source: 'dashboard', categories: {} };
  Object.keys(RAW_DATA).forEach(sheet => {
    const data = RAW_DATA[sheet];
    out.categories[sheet] = {
      competitors: data.competitors,
      products: data.products.map(p => ({
        name: p.name,
        urls: Object.fromEntries(Object.entries(p.urls || {}).filter(([, u]) => isRealUrl(u)).map(([c, u]) => [c, { url: u }]))
      }))
    };
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'urls.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('⬇ urls.json exported');
}

// Init
loadPrices();
loadCatalogOverrides();
applyCatalogOverrides();
loadUrlOverrides();
applyUrlOverrides();
renderTabs();
render();
syncPricesJson(false);  // pull latest scraped prices.json on open (silent if absent)
loadFxRates();          // fetch live USD->EUR/MYR/SGD rates (falls back to defaults)

document.getElementById('currencySelect').addEventListener('change', render);
</script>

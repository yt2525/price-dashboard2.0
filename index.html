<!-- ===================== LOGIN GATE ===================== -->
<!--
  CONFIG: set the username and the SHA-256 hash of the password below.
  This is a client-side gate: it keeps casual visitors out, but it is NOT
  strong security (the page source is viewable and prices.json is fetchable
  directly). For real protection put the site behind Cloudflare Access / a
  server login.

  To change the password, generate a new SHA-256 hash:
    macOS/Linux terminal:  printf '%s' 'YOUR_PASSWORD' | shasum -a 256
    or in this page's console:  await sha256('YOUR_PASSWORD')
  then paste the result into GATE_PASS_HASH.
-->
<div id="loginGate" style="position:fixed;inset:0;z-index:9999;background:#0f1117;display:flex;align-items:center;justify-content:center;">
  <form id="loginForm" style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:32px 28px;width:320px;box-shadow:0 10px 40px rgba(0,0,0,.5);">
    <div style="font-size:1.2rem;font-weight:700;color:#58a6ff;margin-bottom:4px;">Price Dashboard</div>
    <div style="font-size:.8rem;color:#8b949e;margin-bottom:20px;">Sign in to continue</div>
    <input id="loginUser" type="text" placeholder="Username" autocomplete="username"
      style="width:100%;padding:10px 12px;margin-bottom:10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e1e4e8;font-size:.9rem;">
    <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password"
      style="width:100%;padding:10px 12px;margin-bottom:14px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e1e4e8;font-size:.9rem;">
    <button type="submit"
      style="width:100%;padding:10px;border-radius:6px;border:none;background:#238636;color:#fff;font-weight:600;font-size:.9rem;cursor:pointer;">Sign in</button>
    <div id="loginErr" style="display:none;color:#f85149;font-size:.8rem;margin-top:12px;text-align:center;">Incorrect username or password</div>
  </form>
</div>
<script>
  // ---- CONFIG: edit these two lines ----
  const GATE_USER = "teambdmainmarket";
  const GATE_PASS_HASH = "2caa95fe6ba8cc12975f3263a589bbd535bf3280f73ccff5c20fe99fbb9e125e"; // sha256 of the team password
  // --------------------------------------
  async function sha256(str){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  (function(){
    const gate = document.getElementById("loginGate");
    // stay signed in for the browser-tab session
    if (sessionStorage.getItem("dash_auth") === "1"){ gate.style.display="none"; return; }
    document.body.style.overflow = "hidden";
    document.getElementById("loginForm").addEventListener("submit", async function(e){
      e.preventDefault();
      const u = document.getElementById("loginUser").value.trim();
      const p = document.getElementById("loginPass").value;
      const ok = (u === GATE_USER) && (await sha256(p) === GATE_PASS_HASH);
      if (ok){
        sessionStorage.setItem("dash_auth","1");
        gate.style.display="none";
        document.body.style.overflow="";
      } else {
        document.getElementById("loginErr").style.display="block";
        document.getElementById("loginPass").value="";
      }
    });
  })();
</script>
<!-- =================== END LOGIN GATE =================== -->

// ---- Undo ----------------------------------------------------------------
// Each change snapshots the editable state (manual prices + catalog/url
// overrides) BEFORE it happens; undo() restores the most recent snapshot.
let undoStack = [];
let _lastPriceKey = null;     // groups consecutive keystrokes in one cell
let RAW_PRISTINE = null;      // pristine catalog, captured before overrides
function snapshotPristine() { if (!RAW_PRISTINE) RAW_PRISTINE = JSON.parse(JSON.stringify(RAW_DATA)); }
function rebuildCatalog() {
  // Rebuild RAW_DATA products from the pristine copy, then re-apply overrides.
  // Needed so undo of an add/delete is reflected (renames are display-only).
  if (!RAW_PRISTINE) return;
  Object.keys(RAW_PRISTINE).forEach(sheet => {
    if (RAW_DATA[sheet]) RAW_DATA[sheet].products = JSON.parse(JSON.stringify(RAW_PRISTINE[sheet].products));
  });
  // Drop any user-added brand tabs; applyCatalogOverrides recreates the current
  // set (so undo of an "add tab" actually removes it).
  Object.keys(RAW_DATA).forEach(sheet => { if (!RAW_PRISTINE[sheet]) delete RAW_DATA[sheet]; });
  applyCatalogOverrides();
  applyUrlOverrides();
}
function _undoSnap() { return JSON.stringify({ p: prices, c: catalogOverrides, u: urlOverrides }); }
function pushUndoRaw() {
  undoStack.push(_undoSnap());
  if (undoStack.length > 60) undoStack.shift();
  updateUndoBtn();
}
function pushUndo() { _lastPriceKey = null; pushUndoRaw(); }   // for discrete actions
function updateUndoBtn() {
  const b = document.getElementById('undoBtn');
  if (b) {
    b.disabled = undoStack.length === 0;
    b.textContent = '↩ Undo' + (undoStack.length ? ' (' + undoStack.length + ')' : '');
  }
}
function undo() {
  if (!undoStack.length) { toast('Nothing to undo'); return; }
  const s = JSON.parse(undoStack.pop());
  prices = s.p || {};
  catalogOverrides = s.c || {};
  urlOverrides = s.u || {};
  _lastPriceKey = null;
  savePricesLocal(); saveCatalogOverrides(); saveUrlOverrides();
  rebuildCatalog();
  render();
  updateUndoBtn();
  toast('↩ Change undone');
}

function getPriceKey(sheet, productName, competitor) {
  // Normalise the product name so scraped prices match even if one source has a
  // "(Global)" suffix and the other doesn't. Region codes like (US)/(QA) are kept.
  const n = String(productName).replace(/\(global\)/ig, '').replace(/\s+/g, ' ').trim();
  return `${sheet}__${n}__${competitor}`;
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function isRealUrl(v) { return typeof v === 'string' && /^https?:\/\//i.test(v.trim()); }

function getPrice(sheet, productName, competitor) {
  const k = getPriceKey(sheet, productName, competitor);
  // Viewing a past snapshot: show ONLY the captured values (ignore manual edits).
  if (historyMode) {
    const h = scraped[k];
    return (h !== undefined && h !== null && h !== '') ? h : '';
  }
  const manual = prices[k];                       // your own edits win
  if (manual !== undefined && manual !== '') return manual;
  const s = scraped[k];                            // then the live scraped value
  const sReal = (s !== undefined && s !== null && s !== '' && s !== 'N/A');
  if (sReal) return s;
  // PUBLISHED manual price — gap-fill where the scraper has NO REAL value
  // (missing OR 'N/A'), e.g. G2A. This shares keyed-in prices with everyone
  // without overriding live scraped data (a real scraped price wins above).
  if (SHARED_STATE && SHARED_STATE.manualPrices) {
    const sm = SHARED_STATE.manualPrices[k];
    if (sm !== undefined && sm !== null && sm !== '') return sm;
  }
  return (s !== undefined && s !== null && s !== '') ? s : '';  // else show 'N/A'/blank
}

// Load the latest scraped prices.json (written by the GitHub Actions scraper).
async function syncPricesJson(manualClick) {
  const info = document.getElementById('syncInfo');
  try {
    const resp = await fetch('./prices.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error('no prices.json (' + resp.status + ')');
    const data = await resp.json();
    scraped = {};
    const P = data.prices || {};
    Object.keys(P).forEach(sheet => {
      Object.keys(P[sheet]).forEach(pname => {
        Object.entries(P[sheet][pname]).forEach(([comp, val]) => {
          if (val !== null && val !== '') scraped[getPriceKey(sheet, pname, comp)] = val;
        });
      });
    });
    liveScraped = { ...scraped };                  // remember live values for the date picker
    pricesMeta = data.generated || null;
    historyMode = false;
    const dp = document.getElementById('datePicker'); if (dp) dp.value = 'live';
    if (info) info.textContent = pricesMeta ? 'Prices as of ' + new Date(pricesMeta).toLocaleString() : '';
    render();
    if (manualClick) toast('⟳ Loaded latest scraped prices');
    return true;
  } catch (e) {
    if (info) info.textContent = 'No prices.json yet — run the scraper';
    if (manualClick) toast('⚠ ' + e.message);
    return false;
  }
}

// Flatten a snapshot {sheet:{pname:{comp:val}}} into the flat key map used for rendering.
function flattenSnapshot(snap) {
  const flat = {};
  Object.keys(snap || {}).forEach(sheet => {
    Object.keys(snap[sheet]).forEach(pname => {
      Object.entries(snap[sheet][pname]).forEach(([comp, val]) => {
        if (val !== null && val !== '') flat[getPriceKey(sheet, pname, comp)] = val;
      });
    });
  });
  return flat;
}

// Load the daily snapshots and populate the date dropdown (newest first).
async function loadPriceHistory() {
  try {
    const resp = await fetch('./price_history.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) return;
    const data = await resp.json();
    priceHistory = (data && data.history) || {};
    const dp = document.getElementById('datePicker');
    if (!dp) return;
    const today = new Date().toISOString().slice(0, 10);
    dp.querySelectorAll('option:not([value="live"])').forEach(o => o.remove());
    Object.keys(priceHistory).sort().reverse().forEach(d => {
      const o = document.createElement('option');
      o.value = d;
      o.textContent = '📅 ' + d + (d === today ? ' (today)' : '');
      dp.appendChild(o);
    });
  } catch (e) { /* no history yet */ }
}

// Switch the whole table between live prices and a past dated snapshot.
function onDateChange(value) {
  const info = document.getElementById('syncInfo');
  if (value === 'live') {
    historyMode = false;
    scraped = { ...liveScraped };
    if (info) info.textContent = pricesMeta ? 'Prices as of ' + new Date(pricesMeta).toLocaleString() : '';
  } else {
    historyMode = true;
    scraped = flattenSnapshot(priceHistory[value] || {});
    if (info) info.textContent = '🕓 Viewing snapshot from ' + value + ' (read-only)';
  }
  render();
  // In history mode the table is read-only: disable price inputs + Save so a past
  // view can't be accidentally edited/saved over the live data.
  document.querySelectorAll('input.price-input').forEach(inp => { inp.disabled = historyMode; });
}

function setPrice(sheet, productName, competitor, val) {
  const key = getPriceKey(sheet, productName, competitor);
  if (val === '' || val === null) { delete prices[key]; } 
  else { prices[key] = val; }
}

  // Follow the tree placement: under G2G (red) -> focus G2G; under OffGamers
  // (blue) -> focus OG. "Others" brands fall back to the original focus list.
  const g = brandGroup(sheet);

// Tab order: defaults to the tree grouping (G2G red front, OG blue, Others
// purple back); once you drag a tab, a custom order is saved and used instead.
const TAB_ORDER_KEY = 'tab_order_v1';
let tabOrder = null, _tabDrag = null;
function loadTabOrder() { try { tabOrder = JSON.parse(localStorage.getItem(TAB_ORDER_KEY)); } catch (e) { tabOrder = null; } if (!tabOrder && SHARED_STATE && SHARED_STATE.tabOrder) tabOrder = SHARED_STATE.tabOrder.slice(); }
function saveTabOrder(list) { tabOrder = list; try { localStorage.setItem(TAB_ORDER_KEY, JSON.stringify(list)); } catch (e) {} }
function orderedSheets() {
  // Top tabs follow the sidebar EXACTLY: same focus order (G2G then OffGamers),
  // same sub-category order, same brand order within each sub. Rearranging the
  // sidebar therefore reorders the tabs to match.
  const t = treeView();
  const out = [];
  ['G2G', 'OffGamers'].forEach(function (f) {
    const subs = t[f] || {};
    Object.keys(subs)
      .sort(function (a, b) { return (a === 'Others' ? 1 : 0) - (b === 'Others' ? 1 : 0); })
      .forEach(function (sc) {
        subs[sc].forEach(function (s) { if (RAW_DATA[s] && out.indexOf(s) === -1) out.push(s); });
      });
  });
  Object.keys(RAW_DATA).forEach(function (s) { if (out.indexOf(s) === -1) out.push(s); }); // safety net
  return out;
}
function reorderTab(target) {
  if (!_tabDrag || _tabDrag === target) { _tabDrag = null; return; }
  const list = orderedSheets().filter(s => s !== _tabDrag);
  const ti = list.indexOf(target);
  list.splice(ti === -1 ? list.length : ti, 0, _tabDrag);          // drop before target
  saveTabOrder(list);
  const moved = _tabDrag; _tabDrag = null;
  renderTabs();
  toast('Moved tab: ' + moved);
}
// Tab/brand colours: G2G red, OG blue, Others purple by default. A brand can be
// given a custom colour (catalogOverrides._colors[sheet]) which then wins for
// BOTH its top tab and its sidebar entry, and is published to everyone.
const GROUP_COLORS = { g2g: '#f85149', og: '#58a6ff', other: '#a371f7' };
function brandColor(sheet, fallback) {
  const ov = (catalogOverrides && catalogOverrides._colors) ? catalogOverrides._colors[sheet] : null;
  return (ov && /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(ov)) ? ov : fallback;
}
function amendColor(sheet) {
  const cur = (catalogOverrides._colors || {})[sheet] || GROUP_COLORS[brandGroup(sheet)];
  const v = (prompt('Colour for "' + sheet + '" tab & sidebar entry.\nEnter a hex code like #f85149, or leave blank to reset to the group default.', cur) || '').trim();
  pushUndo();
  catalogOverrides._colors = catalogOverrides._colors || {};
  if (!v) { delete catalogOverrides._colors[sheet]; }
  else if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(v)) { catalogOverrides._colors[sheet] = v; }
  else { toast('Not a valid hex colour — use e.g. #f85149'); return; }
  saveCatalogOverrides();
  renderSidebar(); renderTabs();
  toast(v ? ('🎨 Recoloured "' + sheet + '"') : ('Reset "' + sheet + '" to default colour'));
}
function renderTabs() {
  const c = document.getElementById('tabsContainer');
  c.innerHTML = '';

  sheets.forEach(sheet => {
    const t = document.createElement('div');
    const grp = brandGroup(sheet);
    const active = sheet === currentSheet;
    // Colour matches the sidebar (group default, or a custom per-brand colour).
    const col = brandColor(sheet, GROUP_COLORS[grp]);
    t.className = 'tab' + (active ? ' active' : '');
    t.style.color = col;
    if (active) { t.style.borderBottomColor = col; t.style.fontWeight = '700'; }
    t.textContent = sheet;
    t.title = sheet + '  (click to open · right-click for duplicate / recolour / delete · reorder from the sidebar)';
    t.onclick = () => { currentSheet = sheet; renderTabs(); render(); };

// Delete a brand/category tab: removes it from the tabs, sidebar and tree, and
// drops its products, URLs and prices. The deletion is recorded so it stays gone
// after reload, and is published to everyone via "⬆ Publish layout".
function deleteTab(sheet, confirmed) {
  if (!RAW_DATA[sheet]) { toast('No such tab'); return; }
  const sheetCount = orderedSheets().length;
  if (sheetCount <= 1) { toast('Can’t delete the last remaining tab'); return; }
  const n = (RAW_DATA[sheet].products || []).length;
  if (!confirmed && !confirm('Delete the tab "' + sheet + '"' + (n ? ' and its ' + n + ' product(s)' : '') +
    '?\n\nThis removes it from the tabs, sidebar and tree.\nClick "⬆ Publish layout" afterwards to remove it for everyone.')) return;
  pushUndo();
  // 1) Remove from in-memory data.
  delete RAW_DATA[sheet];
  // 2) Stop recreating it as an added tab, and record the deletion so built-in
  //    brands stay hidden after reload (applyCatalogOverrides honours this list).
  if (catalogOverrides._addedCategories) {
    const i = catalogOverrides._addedCategories.indexOf(sheet);
    if (i !== -1) catalogOverrides._addedCategories.splice(i, 1);
  }
  catalogOverrides._deletedCategories = catalogOverrides._deletedCategories || [];
  if (catalogOverrides._deletedCategories.indexOf(sheet) === -1) catalogOverrides._deletedCategories.push(sheet);
  // 3) Drop per-tab overrides + its custom colour.
  delete catalogOverrides[sheet];
  if (catalogOverrides._colors) delete catalogOverrides._colors[sheet];
  // 4) Drop its URL + manual-price keys (keys are prefixed with "<sheet>__").
  const pfx = sheet + '__';
  Object.keys(urlOverrides).forEach(function (k) { if (k.indexOf(pfx) === 0) delete urlOverrides[k]; });
  Object.keys(prices).forEach(function (k) { if (k.indexOf(pfx) === 0) delete prices[k]; });
  // 5) Remove it from the tree (every focus / sub-category it appears in).
  if (!catalogTree) loadTree();
  Object.keys(catalogTree || {}).forEach(function (f) {
    const subs = catalogTree[f] || {};
    Object.keys(subs).forEach(function (sc) {
      catalogTree[f][sc] = subs[sc].filter(function (s) { return s !== sheet; });
    });
  });
  // 6) Move off the deleted tab.
  if (currentSheet === sheet) { const rest = orderedSheets(); currentSheet = rest[0] || ''; }
  saveCatalogOverrides(); saveUrlOverrides(); savePricesLocal(); saveTree();
  renderSidebar(); renderTabs(); render();
  toast('🗑 Deleted "' + sheet + '"');
}

// Rename a brand/category tab (the sheet name). Migrates every structure keyed by
// the name — RAW_DATA, tree, per-tab overrides, colour, tab order, and the
// "<sheet>__" price/URL keys — so nothing is orphaned. For built-in brands the
// rename is recorded in _sheetRenames so applyCatalogOverrides re-applies it to the
// embedded RAW_DATA on reload; for user-added brands the added-list entry is
// updated instead. Publish afterwards to share it with everyone.
function renameSheet(sheet) {
  if (!RAW_DATA[sheet]) { toast('No such tab'); return; }
  const nn = (prompt('Rename brand tab "' + sheet + '" to:', sheet) || '').trim();
  if (!nn || nn === sheet) return;
  if (RAW_DATA[nn]) { toast('A tab named "' + nn + '" already exists'); return; }
  pushUndo();

  // 1) Record persistence of the rename.
  catalogOverrides._addedCategories = catalogOverrides._addedCategories || [];
  const ai = catalogOverrides._addedCategories.indexOf(sheet);
  if (ai !== -1) {
    // User-added brand: it's recreated by name on load, so just rename the entry.
    catalogOverrides._addedCategories[ai] = nn;
  } else {
    // Built-in brand: map old→new so the embedded key is renamed on reload.
    catalogOverrides._sheetRenames = catalogOverrides._sheetRenames || {};
    // Collapse chains: if this sheet was itself the target of an earlier rename,
    // repoint that original key straight to the new name instead of nesting.
    let origKey = sheet;
    Object.keys(catalogOverrides._sheetRenames).forEach(function (k) {
      if (catalogOverrides._sheetRenames[k] === sheet) origKey = k;
    });
    if (origKey === nn) delete catalogOverrides._sheetRenames[origKey]; // renamed back to original
    else catalogOverrides._sheetRenames[origKey] = nn;
  }

  // 2) Migrate in-memory + persisted structures.
  RAW_DATA[nn] = RAW_DATA[sheet]; delete RAW_DATA[sheet];
  if (catalogOverrides[sheet]) { catalogOverrides[nn] = catalogOverrides[sheet]; delete catalogOverrides[sheet]; }
  if (catalogOverrides._colors && catalogOverrides._colors[sheet]) {
    catalogOverrides._colors[nn] = catalogOverrides._colors[sheet]; delete catalogOverrides._colors[sheet];
  }
  if (!catalogTree) loadTree();
  Object.keys(catalogTree || {}).forEach(function (f) {
    const subs = catalogTree[f] || {};
    Object.keys(subs).forEach(function (sc) {
      catalogTree[f][sc] = subs[sc].map(function (s) { return s === sheet ? nn : s; });
    });
  });
  if (Array.isArray(tabOrder)) saveTabOrder(tabOrder.map(function (s) { return s === sheet ? nn : s; }));
  // Re-prefix the "<sheet>__" price and URL keys.
  const oldPfx = sheet + '__', newPfx = nn + '__';
  [prices, urlOverrides].forEach(function (store) {
    Object.keys(store).forEach(function (k) {
      if (k.indexOf(oldPfx) === 0) { store[newPfx + k.slice(oldPfx.length)] = store[k]; delete store[k]; }
    });
  });
  if (currentSheet === sheet) currentSheet = nn;

  saveCatalogOverrides(); saveTree(); saveUrlOverrides(); savePricesLocal();
  renderSidebar(); renderTabs(); render();
  toast('✏️ Renamed "' + sheet + '" → "' + nn + '". Click "⬆ Publish layout" to share it.');
}

// Add a new brand/category tab (a new page). Denominations are then added inside

// Duplicate an existing brand tab into a brand-new tab that carries the SAME
// products, competitor URLs and currently-shown prices. The copy is a snapshot
// (its prices are stored as manual values), persists across reloads, and is
// published to everyone via dashboard_state.json. It's dropped right after the
// original in the tree so the sidebar + tab order stay together.
function duplicateTab(sheet) {
  const src = RAW_DATA[sheet];
  if (!src) { toast('No such tab'); return; }
  const suggested = sheet + ' (copy)';
  let name = (prompt('Duplicate "' + sheet + '" as:\n(new tab with the same products, URLs & prices)', suggested) || '').trim();
  if (!name) return;
  if (RAW_DATA[name]) { toast('A tab named "' + name + '" already exists'); return; }
  pushUndo();
  // 1) Deep-copy the brand (products + their URLs) into a new in-memory sheet.
  const products = (src.products || []).map(function (p) {
    return { name: p.name, urls: Object.assign({}, p.urls || {}) };
  });
  RAW_DATA[name] = { competitors: (src.competitors || COMPETITORS).slice(), products: products };
  // 2) Persist as an added category + its products so it survives reload/publish.
  catalogOverrides._addedCategories = catalogOverrides._addedCategories || [];
  if (catalogOverrides._addedCategories.indexOf(name) === -1) catalogOverrides._addedCategories.push(name);
  if (catalogOverrides._deletedCategories) catalogOverrides._deletedCategories = catalogOverrides._deletedCategories.filter(function (s) { return s !== name; });
  catalogOverrides[name] = { added: products.map(function (p) { return p.name; }) };
  const srcReg = (catalogOverrides[sheet] || {}).regions;
  if (srcReg) catalogOverrides[name].regions = Object.assign({}, srcReg);   // keep region tags
  // 3) Carry the URLs into urlOverrides so they restore on reload + publish.
  products.forEach(function (p) {
    Object.keys(p.urls).forEach(function (comp) {
      if (isRealUrl(p.urls[comp])) urlOverrides[getPriceKey(name, p.name, comp)] = p.urls[comp];
    });
  });
  // 4) Snapshot the currently-shown prices so the copy displays identical values.
  RAW_DATA[name].competitors.forEach(function (comp) {
    products.forEach(function (p) {
      const v = getPrice(sheet, p.name, comp);
      if (v !== '' && v !== null && v !== undefined && v !== 'N/A') prices[getPriceKey(name, p.name, comp)] = v;
    });
  });
  // 5) Place it right after the original in the tree (sidebar + tabs follow).
  if (!catalogTree) loadTree();
  let placed = false;
  ['G2G', 'OffGamers'].forEach(function (f) {
    const subs = catalogTree[f] || {};
    Object.keys(subs).forEach(function (sc) {
      const i = subs[sc].indexOf(sheet);
      if (i !== -1 && !placed) { subs[sc].splice(i + 1, 0, name); placed = true; }
    });
  });
  if (!placed) {
    const grp = brandGroup(sheet) === 'g2g' ? 'G2G' : 'OffGamers';
    catalogTree[grp] = catalogTree[grp] || {};
    (catalogTree[grp]['Others'] = catalogTree[grp]['Others'] || []).push(name);
  }
  // 6) Inherit a custom colour if the original had one.
  const srcCol = (catalogOverrides._colors || {})[sheet];
  if (srcCol) { catalogOverrides._colors = catalogOverrides._colors || {}; catalogOverrides._colors[name] = srcCol; }
  saveCatalogOverrides(); saveUrlOverrides(); savePricesLocal(); saveTree();
  currentSheet = name;
  renderSidebar(); renderTabs(); render();
  toast('⧉ Duplicated "' + sheet + '" → "' + name + '"');
}

    nr.className = 'sb-noresult';
    nr.textContent = 'No brands match “' + sbQuery.trim() + '”';
    el.appendChild(nr);
  }
}
function dropBrand(toFocus, toSub, beforeSheet) {
  if (!_drag) return;
  const src = _drag; _drag = null;
  if (!catalogTree) loadTree();
  if (catalogTree[src.focus] && catalogTree[src.focus][src.sub]) {
    catalogTree[src.focus][src.sub] = catalogTree[src.focus][src.sub].filter(function (s) { return s !== src.sheet; });
  }
  catalogTree[toFocus] = catalogTree[toFocus] || {};
  let arr = (catalogTree[toFocus][toSub] || []).filter(function (s) { return s !== src.sheet; });
  if (beforeSheet && arr.indexOf(beforeSheet) !== -1) arr.splice(arr.indexOf(beforeSheet), 0, src.sheet);
  else arr.push(src.sheet);
  catalogTree[toFocus][toSub] = arr;
  saveTree();
  renderSidebar();
  renderTabs();                 // keep tab colours/grouping aligned with the sidebar
  toast('Moved ' + src.sheet + ' → ' + toFocus + ' / ' + toSub);
}

function calcDiff(ogPrice, competitorPrice) {
  const og = parseFloat(ogPrice);
  const comp = parseFloat(competitorPrice);
  if (isNaN(og) || isNaN(comp) || comp === 0) return null;
  return ((og - comp) / comp * 100).toFixed(1);
}

function getCurrencySymbol() {
  const v = document.getElementById('currencySelect').value;
  return { USD: '$', EUR: '€', MYR: 'RM', SGD: 'S$' }[v] || '$';
}

// ---- Currency: prices are stored in USD; display converts via live FX rates ----
let fxRates = { USD: 1, EUR: 0.92, MYR: 4.7, SGD: 1.34 }; // fallback if fetch fails
async function loadFxRates() {
  try {
    const r = await fetch('https://api.frankfurter.app/latest?from=USD&to=EUR,MYR,SGD');
    if (r.ok) { const d = await r.json(); fxRates = Object.assign({ USD: 1 }, d.rates || {}); render(); }
  } catch (e) { /* keep fallback */ }
}
function getCurrency() { const el = document.getElementById('currencySelect'); return el ? el.value : 'USD'; }
function getRate() { return fxRates[getCurrency()] || 1; }
function usdToDisplay(usd) {
  if (usd === '' || usd === null || usd === undefined) return '';
  const n = parseFloat(usd); if (isNaN(n)) return '';
  return +(n * getRate()).toFixed(2);
}
function displayToUsd(raw) {
  const s = String(raw).trim(); if (s === '') return '';
  const n = parseFloat(s); if (isNaN(n)) return '';
  return +(n / getRate()).toFixed(4);
}
// Interpret what the user typed in a price cell: blank, "N/A", or a number (-> stored USD).
function parsePriceEntry(raw) {
  const s = String(raw).trim();
  if (s === '') return '';
  if (/^n\/?a$/i.test(s)) return 'N/A';
  return displayToUsd(s);
}

function onPriceInput(input) {

  savePricesLocal();
  updateStats();

// Turn an "N/A" cell into an editable price input (manual override).
function naToInput(span) {
  const { sheet, product, competitor } = span.dataset;
  const inp = document.createElement('input');
  inp.type = 'text'; inp.setAttribute('inputmode', 'decimal'); inp.className = 'price-input';
  inp.placeholder = getCurrencySymbol() + '0.00 / N/A';
  inp.title = 'Enter a price, or type N/A if no longer available';
  inp.dataset.sheet = sheet; inp.dataset.product = product; inp.dataset.competitor = competitor;
  inp.addEventListener('input', () => onPriceInput(inp));
  span.replaceWith(inp);
  inp.focus();
}

// Per row, colour the lowest competitor price green and the highest red.
function highlightPrices() {
  const focus = getFocusCompetitor(currentSheet);
  document.querySelectorAll('#tableBody tr[data-product]').forEach(tr => {
    const inputs = [...tr.querySelectorAll('input.price-input')];
    inputs.forEach(i => i.classList.remove('price-low', 'price-high'));
    const vals = inputs
      .map(i => ({ i, v: parseFloat(i.value), focus: i.dataset.competitor === focus }))
      .filter(o => !isNaN(o.v) && o.v > 0);
    if (vals.length === 0) return;
    // Only one offer (no competitor to compare) -> mark it green.
    if (vals.length === 1) { vals[0].i.classList.add('price-low'); return; }
    const min = Math.min(...vals.map(o => o.v));
    const max = Math.max(...vals.map(o => o.v));
    // On a tie at the lowest price, the focus (G2G/OG) wins the draw -> only it
    // is greened; if the focus isn't in the tie, green all tied-lowest cells.
    const focusAtMin = vals.some(o => o.v === min && o.focus);
    if (min === max) {
      const f = vals.find(o => o.focus);
      (f ? [f] : vals).forEach(o => o.i.classList.add('price-low'));
      return;
    }
    vals.forEach(o => {
      if (o.v === min && (!focusAtMin || o.focus)) o.i.classList.add('price-low');
      if (o.v === max) o.i.classList.add('price-high');
    });
  });
}

function updateRowDiffs() {
  const sheet = currentSheet;
  const data = RAW_DATA[sheet];
  const products = data.products;
  const sym = getCurrencySymbol();
  const focus = getFocusCompetitor(sheet);

  const foci = pageFoci(sheet);
  products.forEach((product, pi) => {
    const pname = product.name;

    // Rank uses ALL competitors (incl. the focus itself); #1 = cheapest.
    const allPrices = data.competitors
      .map(c => parseFloat(getPrice(sheet, pname, c)))
      .filter(v => !isNaN(v) && v > 0);

    // Every analysis metric is computed per focus, so shared (G2G+OG) brands show
    // both "G2G Lowest By" and "OG Lowest By" (and vs Avg / Cut to #1) side by side.
    foci.forEach(fc => {
      const fPrice = parseFloat(getPrice(sheet, pname, fc));
      const compPrices = data.competitors.filter(c => c !== fc)
        .map(c => parseFloat(getPrice(sheet, pname, c))).filter(v => !isNaN(v) && v > 0);

      const rankCell = document.getElementById(`rank-${fc}-${pi}`);
      const avgCell = document.getElementById(`avg-${fc}-${pi}`);
      const lowestCell = document.getElementById(`lowest-${fc}-${pi}`);
      const toLeadCell = document.getElementById(`tolead-${fc}-${pi}`);
      const hasFocus = !isNaN(fPrice) && fPrice > 0;

      // Rank
      if (rankCell) {
        if (hasFocus && allPrices.length > 0) {
          const rank = allPrices.filter(v => v < fPrice).length + 1;
          const total = allPrices.length;
          const cls = rank === 1 ? 'diff-green' : (rank === total ? 'diff-red' : 'diff-neutral');
          rankCell.innerHTML = `<span class="diff-badge ${cls}">#${rank} of ${total}</span>`;
        } else {
          rankCell.innerHTML = '<span class="no-prices">—</span>';
        }
      }

      // vs Avg comp
      if (avgCell) {
        if (hasFocus && compPrices.length > 0) {
          const avg = compPrices.reduce((a, b) => a + b, 0) / compPrices.length;
          const diff = ((fPrice - avg) / avg * 100).toFixed(1);
          const isLower = parseFloat(diff) < 0;
          avgCell.innerHTML = `<span class="diff-badge ${isLower ? 'diff-green' : 'diff-red'}">${isLower ? '' : '+'}${diff}%</span>`;
        } else {
          avgCell.innerHTML = '<span class="no-prices">—</span>';
        }
      }

      // Lowest by
      if (lowestCell) {
        if (hasFocus && compPrices.length > 0) {
          const lowestComp = Math.min(...compPrices);
          const diff = ((fPrice - lowestComp) / lowestComp * 100).toFixed(1);
          const isLower = parseFloat(diff) < 0;
          lowestCell.innerHTML = `<span class="diff-badge ${isLower ? 'diff-green' : 'diff-red'}">${isLower ? '✅ ' : '❌ '}${isLower ? '' : '+'}${diff}% vs lowest</span>`;
        } else {
          lowestCell.innerHTML = '<span class="no-prices">—</span>';
        }
      }

      // Cut to #1
      if (toLeadCell) {
        if (hasFocus && compPrices.length > 0) {
          const lowestComp = Math.min(...compPrices);
          if (fPrice <= lowestComp) {
            toLeadCell.innerHTML = `<span class="diff-badge diff-green">✅ already #1</span>`;
          } else {
            const cut = ((fPrice - lowestComp) / fPrice * 100);
            toLeadCell.innerHTML = `<span class="diff-badge diff-red">↓ ${cut.toFixed(1)}% to lead</span>`;
          }
        } else {
          toLeadCell.innerHTML = '<span class="no-prices">—</span>';
        }
      }
    });
  });
}

function updateStats() {
  const sheet = currentSheet;
  const data = RAW_DATA[sheet];
  const products = data.products;
  const foci = pageFoci(sheet); // [primary] or [G2G, OG] for shared brands
  const s = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };

  // "Prices Entered" counts rows where the primary focus has a price (unchanged).
  let entered = 0;
  const primary = foci[0];
  products.forEach(p => { const v = parseFloat(getPrice(sheet, p.name, primary)); if (!isNaN(v) && v > 0) entered++; });

  // Lowest / Advantage / Higher / Rank computed independently for EACH focus, so
  // shared (G2G+OG) brands show "G2G lowest by" and "OG lowest by" separately.
  foci.forEach(fc => {
    let lowestCount = 0, higherCount = 0, totalAdv = 0, advCount = 0;
    const ranks = [];
    products.forEach(product => {
      const pname = product.name;
      const fp = parseFloat(getPrice(sheet, pname, fc));
      if (isNaN(fp) || fp <= 0) return;

      // Rank among ALL competitors with a price (incl. focus); #1 = cheapest.
      const allPrices = data.competitors.map(c => parseFloat(getPrice(sheet, pname, c))).filter(v => !isNaN(v) && v > 0);
      if (allPrices.length > 0) ranks.push(allPrices.filter(v => v < fp).length + 1);

      const compPrices = data.competitors.filter(c => c !== fc)
        .map(c => parseFloat(getPrice(sheet, pname, c))).filter(v => !isNaN(v) && v > 0);
      if (compPrices.length === 0) return;
      const lowestComp = Math.min(...compPrices);
      if (fp <= lowestComp) lowestCount++; else higherCount++;
      totalAdv += (lowestComp - fp) / lowestComp * 100;
      advCount++;
    });

    // MEDIAN rank (not mean). A brand cheapest on most products but beaten on a
    // few (e.g. iTunes: #1 on 17/25) reads as #1 instead of being dragged to #2.
    // The "of N" pool = competitors with at least one price anywhere on this page.
    const pool = data.competitors.filter(c =>
      products.some(p => { const v = parseFloat(getPrice(sheet, p.name, c)); return !isNaN(v) && v > 0; })
    ).length;
    let medStr = '-';
    if (ranks.length) {
      ranks.sort((a, b) => a - b);
      const mid = Math.floor(ranks.length / 2);
      const med = ranks.length % 2 ? ranks[mid] : Math.round((ranks[mid - 1] + ranks[mid]) / 2);
      medStr = '#' + med + ' of ' + pool;
    }
    s('stat-med-rank-' + fc, medStr);
    s('stat-lowest-' + fc, lowestCount);
    s('stat-avg-adv-' + fc, advCount > 0 ? (totalAdv / advCount).toFixed(1) + '%' : '-');
    s('stat-higher-' + fc, higherCount);
  });
  s('stat-entered', entered);
}

function updateCharts() {

        }

  let diffTitle, diffDsLabel;

      if (isNaN(ogP) || ogP <= 0) return;
      const compPs = competitors.filter(c => c !== focus).map(c => parseFloat(getPrice(sheet, p.name, c))).filter(v => !isNaN(v) && v > 0);
      if (compPs.length === 0) return;
      const avgComp = compPs.reduce((a,b) => a+b, 0) / compPs.length;
      const d = +(((ogP - avgComp) / avgComp) * 100).toFixed(1);
      { const pl = productLabel(sheet, p.name); diffLabels.push(pl.length > 22 ? pl.substring(0,20) + '…' : pl); }
      diffVals.push(d);
      diffColors.push(d <= 0 ? '#3fb950' : '#f85149');
    });
    diffTitle = `${focus} vs Average Competitor % — by Denomination`;
    diffDsLabel = `${focus} vs Avg Comp %`;
  } else {
    const ogPrice = parseFloat(getPrice(sheet, pname, focus));

          diffColors.push(d <= 0 ? '#3fb950' : '#f85149');

  const diffCtx = document.getElementById('diffChart');
  if (diffCtx) {
    if (charts.diff) charts.diff.destroy();
    charts.diff = new Chart(diffCtx, {
      type: 'bar',
      data: { labels: diffLabels, datasets: [{ label: diffDsLabel, data: diffVals, backgroundColor: diffColors, borderRadius: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, title: { display: true, text: diffTitle, color: '#c9d1d9', font: { size: 12 } } },
        scales: {
          y: { ticks: { color: '#8b949e', callback: v => v + '%' }, grid: { color: '#30363d' } },
          x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
        }
      }
    });
  }

  // Summary chart: for each product that has OG + some competitor, show OG advantage
  const sumLabels = [], sumVals = [], sumColors = [];
  products.forEach(p => {
    const ogP = parseFloat(getPrice(sheet, p.name, focus));
    if (isNaN(ogP) || ogP <= 0) return;
    const compPs = competitors.filter(c => c !== focus).map(c => parseFloat(getPrice(sheet, p.name, c))).filter(v => !isNaN(v) && v > 0);
    if (compPs.length === 0) return;
    const avgComp = compPs.reduce((a,b) => a+b,0) / compPs.length;
    const diff = parseFloat(((ogP - avgComp) / avgComp * 100).toFixed(1));
    const pl = productLabel(sheet, p.name);
    const label = pl.length > 30 ? pl.substring(0,28)+'…' : pl;
    sumLabels.push(label);
    sumVals.push(diff);
    sumColors.push(diff <= 0 ? '#3fb950' : '#f85149');
  });
  
  const sumCtx = document.getElementById('summaryChart');
  if (sumCtx) {
    if (charts.summary) charts.summary.destroy();
    if (sumVals.length > 0) {
      charts.summary = new Chart(sumCtx, {
        type: 'bar',
        data: { labels: sumLabels, datasets: [{ label: `${focus} vs Avg Comp %`, data: sumVals, backgroundColor: sumColors, borderRadius: 4 }] },
        options: {
          responsive: true, maintainAspectRatio: false, indexAxis: 'y',
          plugins: { legend: { display: false }, title: { display: true, text: `${focus} vs Average Competitor Price (%) — All Products`, color: '#c9d1d9', font: { size: 12 } } },
          scales: {
            x: { ticks: { color: '#8b949e', callback: v => v + '%' }, grid: { color: '#30363d' } },
            y: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#30363d' } }
          }
        }
      });
    }
  }
}

// ── Price Fetching via CORS Proxy ──────────────────────────────────────────

const CORS_PROXY = 'https://corsproxy.io/?url=';

// Site-specific sold-out / unavailable markers
const SOLD_OUT_PATTERNS = [
  /sold[\s-]?out/i, /out[\s-]?of[\s-]?stock/i, /not[\s-]?available/i,
  /unavailable/i, /currently[\s-]?unavailable/i, /no[\s-]?stock/i
];

function isSoldOut(html) {
  return SOLD_OUT_PATTERNS.some(p => p.test(html));
}

// Extract price from schema.org JSON-LD
function extractJsonLdPrice(html) {
  const blocks = [...html.matchAll(/<script[^>]*type="application\/ld\+json"[^>]*>([\s\S]*?)<\/script>/gi)];
  for (const b of blocks) {
    try {
      const data = JSON.parse(b[1]);
      const scan = (obj) => {
        if (!obj || typeof obj !== 'object') return null;
        if (obj['@type'] === 'Product' || obj['@type'] === 'Offer') {
          const offers = obj.offers || obj;
          const p = offers.price ?? offers.lowPrice ?? offers.highPrice;
          if (p != null && !isNaN(parseFloat(p))) return parseFloat(p);
        }
        for (const v of Object.values(obj)) {
          if (Array.isArray(v)) { for (const i of v) { const r = scan(i); if (r) return r; } }
          else { const r = scan(v); if (r) return r; }
        }
        return null;
      };
      const p = scan(data);
      if (p) return p;
    } catch(e) {}
  }
  return null;
}

// Site-specific parsers
function parsePriceForSite(html, competitor, url) {
  // 1. Try JSON-LD first (works on OG, SEAGM, Moogold, LapakGaming)
  const jld = extractJsonLdPrice(html);
  if (jld) return jld;

  // 2. meta product:price:amount (OpenGraph)
  const ogMeta = html.match(/property="product:price:amount"\s+content="([^"]+)"/i)
                 || html.match(/content="([^"]+)"\s+property="product:price:amount"/i);
  if (ogMeta) return parseFloat(ogMeta[1]);

  // 3. itemprop price
  const itemprop = html.match(/itemprop="price"[^>]*content="([^"]+)"/i)
                || html.match(/itemprop="price"[^>]*>([^<]+)</i);
  if (itemprop) { const v = parseFloat(itemprop[1]); if (!isNaN(v)) return v; }

  // 4. Site-specific patterns
  if (url.includes('offgamers.com')) {
    const m = html.match(/["']price["']\s*:\s*["']?(\d+\.?\d*)["']?/);
    if (m) return parseFloat(m[1]);
  }
  if (url.includes('seagm.com')) {
    const m = html.match(/class="[^"]*price[^"]*"[^>]*>\s*[\w$€£¥]?\s*([\d,]+\.?\d*)/i);
    if (m) return parseFloat(m[1].replace(/,/g,''));
  }
  if (url.includes('moogold.com')) {
    const m = html.match(/["']regular_price["']\s*:\s*["']?(\d+\.?\d*)["']?/)
           || html.match(/class="[^"]*woocommerce-Price-amount[^"]*"[^>]*>[\s\S]*?([\d,]+\.?\d*)/i);
    if (m) return parseFloat(m[1].replace(/,/g,''));
  }
  if (url.includes('lapakgaming.com')) {
    const m = html.match(/["']price["']\s*:\s*(\d+\.?\d*)/)
           || html.match(/Rp\s*([\d,.]+)/);
    if (m) return parseFloat(m[1].replace(/[.,]/g,''));
  }
  if (url.includes('codashop.com')) {
    const m = html.match(/["']price["']\s*:\s*["']?(\d+\.?\d*)["']?/);
    if (m) return parseFloat(m[1]);
  }
  if (url.includes('unipin.com')) {
    const m = html.match(/["']price["']\s*:\s*(\d+\.?\d*)/);
    if (m) return parseFloat(m[1]);
  }

  // 5. Generic number near currency symbols
  const currencyMatch = html.match(/(?:USD|US\$|\$|€|£)\s*([\d,]+\.?\d*)/);
  if (currencyMatch) return parseFloat(currencyMatch[1].replace(/,/g,''));

  return null;
}

async function fetchPriceForURL(url, competitor) {
  try {
    const resp = await fetch(CORS_PROXY + encodeURIComponent(url), {
      signal: AbortSignal.timeout(12000)
    });
    if (!resp.ok) return 'N/A';
    const html = await resp.text();
    if (isSoldOut(html)) return 'N/A';
    const price = parsePriceForSite(html, competitor, url);
    return price != null ? String(price) : null; // null = could not parse
  } catch(e) {
    return null;
  }
}

// Batch fetch all visible products for current sheet
async function fetchAllPrices() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Fetching…';

  const progressEl = document.getElementById('fetchProgress');
  const progressText = document.getElementById('fetchProgressText');
  const progressBar = document.getElementById('fetchBarInner');
  progressEl.classList.add('show');

  const { competitors, products } = RAW_DATA[currentSheet];
  const tasks = [];
  products.forEach((product, pi) => {
    competitors.forEach(comp => {
      const url = product.urls[comp];
      if (isRealUrl(url)) tasks.push({ url, comp, sheet: currentSheet, pname: product.name, pi });
    });
  });

  let done = 0;
  const CONCURRENCY = 4;
  let idx = 0;

  async function runNext() {
    while (idx < tasks.length) {
      const task = tasks[idx++];
      progressText.textContent = `Fetching ${done + 1} / ${tasks.length}…`;
      progressBar.style.width = (done / tasks.length * 100) + '%';

      const result = await fetchPriceForURL(task.url, task.comp);
      done++;

      if (result !== null) {
        const displayVal = result === 'N/A' ? 'N/A' : result;
        // Update price store
        if (result !== 'N/A') {
          setPrice(task.sheet, task.pname, task.comp, result);
        }
        // Update DOM input
        const inputs = document.querySelectorAll(
          `input[data-sheet="${task.sheet.replace(/"/g,'&quot;')}"][data-product="${task.pname.replace(/"/g,'&quot;')}"][data-competitor="${task.comp}"]`
        );
        inputs.forEach(input => {
          if (result === 'N/A') {
            input.value = '';
            input.placeholder = 'N/A';
            input.style.color = '#8b949e';
          } else {
            input.value = result;
            input.style.color = '';
          }
        });
      }

      progressBar.style.width = (done / tasks.length * 100) + '%';
    }
  }

  // Run with concurrency limit
  const workers = Array.from({ length: CONCURRENCY }, runNext);
  await Promise.all(workers);

  savePricesLocal();
  updateStats();
  updateCharts();

  progressText.textContent = `✅ Done — ${done} URLs checked`;
  progressBar.style.width = '100%';
  setTimeout(() => progressEl.classList.remove('show'), 3000);

  btn.disabled = false;
  btn.textContent = '🔄 Fetch Prices';
  toast(`✅ Fetched prices for ${currentSheet}`);
}

// ---- Custom catalog: user-added denominations + renamed products (saved locally) ----
let catalogOverrides = {};
function loadCatalogOverrides() {
  let ls = null;
  try { ls = JSON.parse(localStorage.getItem('catalog_overrides_v1')); } catch (e) { ls = null; }
  if (ls && Object.keys(ls).length) catalogOverrides = ls;
  else catalogOverrides = (SHARED_STATE && SHARED_STATE.overrides) ? JSON.parse(JSON.stringify(SHARED_STATE.overrides)) : {};
}
function saveCatalogOverrides() {
  localStorage.setItem('catalog_overrides_v1', JSON.stringify(catalogOverrides));
}

// Competitor display name override (display-only — the underlying key stays the
// same so prices.json matching and the G2G/OG focus logic are unaffected).
function compLabel(comp) {
  const m = catalogOverrides._compNames || {};
  return (m[comp] && String(m[comp]).trim()) ? m[comp] : comp;
}
// Product display name override (display-only — the underlying product name is
// the price key, so renaming must NOT change it or scraped prices would orphan).
// Keyed by the original catalog name.
function productLabel(sheet, name) {
  const m = (catalogOverrides[sheet] || {}).renames || {};
  return (m[name] && String(m[name]).trim()) ? m[name] : name;
}
// ---- Per-product region (drives region-specific name-search) ----
const REGION_OPTS = ['', 'Global', 'US', 'MY', 'SG', 'EU', 'GB', 'JP'];
function parseRegion(name) { const m = String(name).match(/\(([A-Za-z]{2,5})\)/); return m ? m[1].toUpperCase() : ''; }
function regionFor(sheet, name) {
  const ov = (catalogOverrides[sheet] || {}).regions || {};
  return ov[name] !== undefined ? ov[name] : parseRegion(name);   // override else parsed from name
}
function setRegion(sheet, name, val) {
  catalogOverrides[sheet] = catalogOverrides[sheet] || {};
  catalogOverrides[sheet].regions = catalogOverrides[sheet].regions || {};
  if (val) catalogOverrides[sheet].regions[name] = val; else delete catalogOverrides[sheet].regions[name];
  saveCatalogOverrides();
}
function customRegions() { return (catalogOverrides._regions || []).slice(); }
function addCustomRegion(code) {
  catalogOverrides._regions = catalogOverrides._regions || [];
  if (catalogOverrides._regions.indexOf(code) === -1) catalogOverrides._regions.push(code);
  saveCatalogOverrides();
}
function allRegionOpts() {
  const out = REGION_OPTS.slice();
  customRegions().forEach(r => { if (out.indexOf(r) === -1) out.push(r); });
  return out;
}
function onRegionChange(pi, val) {
  const sheet = currentSheet, p = RAW_DATA[sheet].products[pi];
  if (!p) return;
  if (val === '__add__') { showRegionInput(pi); return; }   // inline text box (no popup)
  pushUndo();
  setRegion(sheet, p.name, val);
  toast('🌐 Region for "' + productLabel(sheet, p.name) + '" → ' + (val || 'auto'));
}
// Inline "type a new region" box (replaces the dropdown for that row).
function showRegionInput(pi) {
  const row = document.querySelector('#tableBody tr[data-product="' + pi + '"]');
  const sel = row && row.querySelector('.region-sel');
  if (!sel) return;
  const td = sel.parentElement;
  td.innerHTML = '<input class="region-sel" id="region-input-' + pi + '" placeholder="e.g. TH ⏎" style="width:78px">';
  const inp = document.getElementById('region-input-' + pi);
  inp.focus();
  inp.onkeydown = function (e) {
    if (e.key === 'Enter') { e.preventDefault(); commitRegionInput(pi, inp.value); }
    else if (e.key === 'Escape') { renderContent(); }
  };
  inp.onblur = function () { if (document.body.contains(inp)) { inp.value.trim() ? commitRegionInput(pi, inp.value) : renderContent(); } };
}
function commitRegionInput(pi, raw) {
  const sheet = currentSheet, p = RAW_DATA[sheet].products[pi];
  let code = (raw || '').trim();
  if (/^[A-Za-z]{2,6}$/.test(code)) code = code.toUpperCase();
  if (!p || !code) { renderContent(); return; }
  pushUndo();
  addCustomRegion(code);
  setRegion(sheet, p.name, code);
  renderContent();
  toast('🌐 Added region "' + code + '"');
}
function regionSelectHtml(sheet, pi, name) {
  const cur = regionFor(sheet, name);
  const opts = allRegionOpts();
  if (cur && opts.indexOf(cur) === -1) opts.push(cur);   // keep an unusual parsed region visible
  return `<select class="region-sel" onchange="onRegionChange(${pi}, this.value)" title="Region used for price search">`
    + opts.map(o => `<option value="${escHtml(o)}"${o === cur ? ' selected' : ''}>${o ? escHtml(o) : '—'}</option>`).join('')
    + `<option value="__add__">＋ Add region…</option>`
    + `</select>`;
}
function editCompetitorName(comp) {
  const cur = compLabel(comp);
  const v = (prompt('Rename competitor (display only):', cur) || '').trim();
  if (v === '' || v === cur) return;
  pushUndo();
  catalogOverrides._compNames = catalogOverrides._compNames || {};
  if (v === comp) delete catalogOverrides._compNames[comp];   // reset to default
  else catalogOverrides._compNames[comp] = v;
  saveCatalogOverrides();
  renderContent();
  toast('✏️ Competitor renamed');
}
function applyCatalogOverrides() {
  // Recreate user-added brand tabs (new categories) first, so their products
  // (below) have a sheet to attach to.
  (catalogOverrides._addedCategories || []).forEach(cat => {
    if (!RAW_DATA[cat]) RAW_DATA[cat] = { competitors: COMPETITORS.slice(), products: [] };
  });
  // Honour deleted tabs (built-in brands removed via the 🗑 button stay hidden).
  (catalogOverrides._deletedCategories || []).forEach(cat => { delete RAW_DATA[cat]; });
  // Re-apply brand renames to the embedded RAW_DATA keys (built-in brands). The
  // tree, tab order and price/URL keys were already migrated at rename time, so
  // only the RAW_DATA key needs renaming here.
  Object.entries(catalogOverrides._sheetRenames || {}).forEach(([oldN, newN]) => {
    if (RAW_DATA[oldN] && !RAW_DATA[newN]) { RAW_DATA[newN] = RAW_DATA[oldN]; delete RAW_DATA[oldN]; }
  });
  Object.keys(RAW_DATA).forEach(sheet => {
    const ov = catalogOverrides[sheet];
    if (!ov) return;
    // NOTE: renames are display-only (see productLabel). We intentionally do NOT
    // rewrite p.name here — the original name is the price key, and changing it
    // would orphan every scraped/manual price for the product.
    if (ov.added) {
      ov.added.forEach(name => {
        if (!RAW_DATA[sheet].products.some(p => p.name === name)) {
          RAW_DATA[sheet].products.push({ name: name, urls: {} });
        }
      });
    }
    if (ov.deleted && ov.deleted.length) {
      RAW_DATA[sheet].products = RAW_DATA[sheet].products.filter(p => !ov.deleted.includes(p.name));
    }
  });
}
function addDenomination() {

// Build custom_products.json from everything you've added across all tabs, and
// download it. Commit that file to the repo so the scraper fetches prices for
// these URL-less products via name-search. Same shape as urls.json.
function exportCustomProducts() {
  const categories = {};
  let total = 0;
  // Export every URL-less product (the name-search set: imported new brands +
  // anything you added), each tagged with its Region so the scraper targets it.
  Object.keys(RAW_DATA).forEach(sheet => {
    const data = RAW_DATA[sheet];
    const comps = data.competitors || COMPETITORS;
    const prods = [];
    (data.products || []).forEach(p => {
      const hasUrl = comps.some(c => isRealUrl((p.urls || {})[c]));
      if (hasUrl) return;                            // has a URL -> handled by urls.json
      const entry = { name: p.name, urls: {} };
      const r = regionFor(sheet, p.name);
      if (r) entry.region = r;
      prods.push(entry);
    });
    if (prods.length) { categories[sheet] = { products: prods }; total += prods.length; }
  });
  if (!total) { toast('No name-search products to export'); return; }
  const payload = { generated: new Date().toISOString(), source: 'dashboard', categories };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'custom_products.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('⬇ Exported ' + total + ' product(s) → commit custom_products.json to the repo');
}
function editProductName(pi) {

  const product = RAW_DATA[sheet].products[pi];
  if (!product) return;
  const origName = product.name;                 // the price key — never changes
  const current = productLabel(sheet, origName);  // what's shown now

  if (!newLabel || newLabel === current) return;
  pushUndo();

  catalogOverrides[sheet] = catalogOverrides[sheet] || {};
  catalogOverrides[sheet].renames = catalogOverrides[sheet].renames || {};
  if (newLabel === origName) delete catalogOverrides[sheet].renames[origName]; // reset to default
  else catalogOverrides[sheet].renames[origName] = newLabel;

function deleteDenomination(pi) {
  const sheet = currentSheet;
  const product = RAW_DATA[sheet].products[pi];
  if (!product) return;
  const name = product.name;
  if (!confirm('Delete "' + name + '"? This removes the row from ' + sheet + '.')) return;
  pushUndo();
  // remove the product row
  RAW_DATA[sheet].products.splice(pi, 1);
  // clean up any saved manual prices for it
  (RAW_DATA[sheet].competitors || []).forEach(c => { delete prices[getPriceKey(sheet, name, c)]; });
  savePricesLocal();
  // persist the deletion
  catalogOverrides[sheet] = catalogOverrides[sheet] || {};
  if (catalogOverrides[sheet].added && catalogOverrides[sheet].added.includes(name)) {
    // it was a user-added row — just drop it from added
    catalogOverrides[sheet].added = catalogOverrides[sheet].added.filter(n => n !== name);
  } else {
    catalogOverrides[sheet].deleted = catalogOverrides[sheet].deleted || [];
    if (!catalogOverrides[sheet].deleted.includes(name)) catalogOverrides[sheet].deleted.push(name);
  }
  saveCatalogOverrides();
  renderContent();
  toast('🗑 Deleted "' + name + '"');
}

function loadUrlOverrides() {
  let ls = null;
  try { ls = JSON.parse(localStorage.getItem('url_overrides_v1')); } catch (e) { ls = null; }
  if (ls && Object.keys(ls).length) urlOverrides = ls;
  else urlOverrides = (SHARED_STATE && SHARED_STATE.urlOverrides) ? JSON.parse(JSON.stringify(SHARED_STATE.urlOverrides)) : {};
}
function saveUrlOverrides() { localStorage.setItem('url_overrides_v1', JSON.stringify(urlOverrides)); }
// Publish the editor's layout/catalog so all viewers see it. Downloads
// dashboard_state.json (category tree, tab order, added brands, renames, URL
// edits). Commit that file to the repo; the dashboard loads it for everyone via
// loadSharedState(). Prices are NOT included here — they come from the scraper's
// prices.json so they stay live.
function exportState() {
  // Manual prices to publish = keyed-in values the scraper has NO value for
  // (e.g. G2A). Excludes anything the scraper already provides, so we never
  // publish a stale price or override live data — pure gap-fill for everyone.
  let localPrices = {};
  try { localPrices = JSON.parse(localStorage.getItem('og_prices_v2') || '{}'); } catch (e) { localPrices = {}; }
  const manualPrices = {};
  for (const k of Object.keys(localPrices)) {
    const v = localPrices[k];
    if (!(parseFloat(v) > 0)) continue;            // only real keyed-in prices
    const s = scraped[k];
    const sReal = (s !== undefined && s !== null && s !== '' && s !== 'N/A' && parseFloat(s) > 0);
    if (!sReal) manualPrices[k] = v;               // publish where scraper has no REAL value (missing OR 'N/A')
  }
  const state = {
    tree: JSON.parse(localStorage.getItem('catalog_tree_v1') || 'null'),
    tabOrder: JSON.parse(localStorage.getItem('tab_order_v1') || 'null'),
    overrides: JSON.parse(localStorage.getItem('catalog_overrides_v1') || '{}'),
    urlOverrides: JSON.parse(localStorage.getItem('url_overrides_v1') || '{}'),
    manualPrices: manualPrices
  };
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'dashboard_state.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('⬆ dashboard_state.json downloaded — commit it to the repo to share your layout');
}
function applyUrlOverrides() {
  Object.keys(urlOverrides).forEach(key => {
    const [sheet, product, comp] = key.split('__');
    const data = RAW_DATA[sheet]; if (!data) return;
    const p = data.products.find(p => p.name === product); if (!p) return;
    p.urls = p.urls || {};
    if (urlOverrides[key]) p.urls[comp] = urlOverrides[key]; else delete p.urls[comp];
  });
}
function onUrlEdit(inp) {
  const sheet = inp.dataset.sheet, product = inp.dataset.product, comp = inp.dataset.comp;
  const v = inp.value.trim();
  const data = RAW_DATA[sheet];
  const p = data && data.products.find(p => p.name === product);
  pushUndo();
  if (p) { p.urls = p.urls || {}; if (v) p.urls[comp] = v; else delete p.urls[comp]; }
  urlOverrides[getPriceKey(sheet, product, comp)] = v;
  saveUrlOverrides();
  inp.classList.toggle('has-url', isRealUrl(v));
}
function openUrl(btn) {
  const inp = btn.parentElement.querySelector('input');
  const v = inp && inp.value.trim();
  if (isRealUrl(v)) window.open(v, '_blank', 'noopener');
  else toast('No link for this one (N/A)');
}
function renderUrlManager() {
  const container = document.getElementById('mainContent');
  let html = `<div class="urlmgr-head"><h2>🔗 Manage URLs</h2>`
    + `<div><button class="btn btn-secondary" onclick="exportUrlsJson()">⬇ Export urls.json</button></div></div>`
    + `<p class="urlmgr-note">Edit any URL inline — changes save in your browser. Click ↗ to open the page in a new tab. `
    + `Automatic price capture runs server-side via the scheduled scraper; a browser can't read prices from these sites directly. `
    + `Use <b>Export urls.json</b> to download your edits and commit them so the scraper picks them up.</p>`;
  Object.keys(RAW_DATA).forEach(sheet => {
    const data = RAW_DATA[sheet];
    html += `<details class="urlmgr-cat"${sheet === currentSheet ? ' open' : ''}>`
      + `<summary>${escHtml(sheet)} <span class="muted">(${data.products.length} products)</span></summary>`;
    data.products.forEach(p => {
      html += `<div class="urlmgr-product"><div class="urlmgr-pname">${escHtml(p.name)}</div>`;
      data.competitors.forEach(c => {
        const u = (p.urls && p.urls[c]) || '';
        html += `<div class="urlmgr-row"><span class="urlmgr-comp">${escHtml(c)}</span>`
          + `<input class="urlmgr-input${isRealUrl(u) ? ' has-url' : ''}" type="url" value="${escHtml(u)}" placeholder="(no URL)" `
          + `data-sheet="${escHtml(sheet)}" data-product="${escHtml(p.name)}" data-comp="${escHtml(c)}" onchange="onUrlEdit(this)">`
          + `<button class="mini-btn" title="Open page" onclick="openUrl(this)">↗</button></div>`;
      });
      html += `</div>`;
    });
    html += `</details>`;
  });
  container.innerHTML = html;
}
function exportUrlsJson() {
  const out = { generated: new Date().toISOString(), source: 'dashboard', categories: {} };
  Object.keys(RAW_DATA).forEach(sheet => {
    const data = RAW_DATA[sheet];
    out.categories[sheet] = {
      competitors: data.competitors,
      products: data.products.map(p => ({
        name: p.name,
        urls: Object.fromEntries(Object.entries(p.urls || {}).filter(([, u]) => isRealUrl(u)).map(([c, u]) => [c, { url: u }]))
      }))
    };
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'urls.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('⬇ urls.json exported');
}

// Init. We await the committed shared state FIRST so visitors (with no local
// edits) get the published layout/catalog before anything renders.
async function boot() {
  await loadSharedState();
  loadPrices();
  loadCatalogOverrides();
  loadTree();
  loadTabOrder();
  snapshotPristine();      // capture pristine catalog before overrides mutate it
  applyCatalogOverrides();
  loadUrlOverrides();
  applyUrlOverrides();
  renderTabs();
  render();
  setupSidebarSearch();
  updateUndoBtn();
  syncPricesJson(false);  // pull latest scraped prices.json on open (silent if absent)
  loadPriceHistory();     // populate the date dropdown with daily snapshots
  loadFxRates();          // fetch live USD->EUR/MYR/SGD rates (falls back to defaults)
}
// Wire the sidebar brand-search box: filter on input, show/hide the clear (×),
// and let Esc clear the field.
function setupSidebarSearch() {
  const inp = document.getElementById('sbSearch');
  const clr = document.getElementById('sbSearchClear');
  if (!inp || inp._wired) return;
  inp._wired = true;
  function apply() {
    sbQuery = inp.value || '';
    clr.style.display = sbQuery.trim() ? 'block' : 'none';
    renderSidebar();
  }
  inp.addEventListener('input', apply);
  inp.addEventListener('keydown', function (e) { if (e.key === 'Escape') { inp.value = ''; apply(); } });
  clr.addEventListener('click', function () { inp.value = ''; apply(); inp.focus(); });
}
boot();
// Cmd/Ctrl+Z to undo (ignore when typing in a price cell so native text undo works there)
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && (e.key === 'z' || e.key === 'Z')) {
    const t = e.target;
    if (t && t.tagName === 'INPUT') return;   // let the field handle its own undo
    e.preventDefault();
    undo();
  }
});

document.getElementById('currencySelect').addEventListener('change', render);
</script>
